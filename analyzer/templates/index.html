<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        AI Resume Copilot
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#eef2ff;
            font-family:Arial, sans-serif;
        }

        .main-title{
            font-size:50px;
            font-weight:bold;
            color:#1e293b;
        }

        .subtitle{
            color:#475569;
        }

        .main-card{
            border:none;
            border-radius:20px;
        }

        .btn-custom{
            background:#2563eb;
            color:white;
            font-weight:bold;
            padding:12px;
            border:none;
            border-radius:10px;
        }

        .btn-custom:hover{
            background:#1d4ed8;
        }

        .result-box{
            white-space: pre-wrap;
            line-height:1.8;
            font-size:16px;
            color:#111827;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1 class="main-title">
            AI Resume Copilot
        </h1>

        <p class="subtitle">
            Upload Resume • Get AI Insights • Crack Interviews
        </p>

    </div>

    <div class="card shadow-lg p-4 main-card">

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label fw-bold">
                    Upload Resume (PDF)
                </label>

                <input type="file"
                       class="form-control"
                       name="resume"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label fw-bold">
                    Enter Job Role
                </label>

                <input type="text"
                       class="form-control"
                       name="job_role"
                       placeholder="AI Engineer Intern"
                       required>

            </div>

            <button class="btn-custom w-100">
                Analyze Resume
            </button>

        </form>

    </div>

    {% if result %}

    <div class="card shadow-lg p-4 mt-5 main-card">

        <h2 class="mb-4">
            AI Analysis Result
        </h2>

        <div class="result-box">

            {{ result }}

        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
